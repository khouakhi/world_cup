# Firebase App Hosting configuration
# See DEPLOY_ONLINE.md for setup instructions.
# Secrets (FIREBASE_SERVICE_ACCOUNT_JSON) are configured in the Firebase Console.

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 3
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: world-cup-predictions-48f1d
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_URL
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: CRON_SECRET
    secret: CRON_SECRET
  - variable: FIREBASE_SERVICE_ACCOUNT_JSON
    secret: FIREBASE_SERVICE_ACCOUNT_JSON
  - variable: API_FOOTBALL_KEY
    secret: API_FOOTBALL_KEY
    availability:
      - RUNTIME
